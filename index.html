<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Fiscais - Gerenciamento de Recebimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#f8fafc] text-gray-700 font-sans p-6">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">📋 Notas Fiscais</h1>
                <p class="text-sm text-gray-500">Gerenciamento de recebimento</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportarCSV()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium bg-white hover:bg-gray-50 flex items-center gap-2 transition">
                    <i class="fa-solid fa-download"></i> Exportar CSV
                </button>
                <button onclick="abrirModal()" class="px-4 py-2 bg-[#1e56a0] hover:bg-[#163f75] text-white rounded-lg text-sm font-medium flex items-center gap-2 transition">
                    <i class="fa-solid fa-plus"></i> Nova Nota Fiscal
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total de Notas</p>
                <p id="card-total-notas" class="text-2xl font-bold text-[#1e56a0] mt-1">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Valor Total</p>
                <p id="card-valor-total" class="text-2xl font-bold text-gray-800 mt-1">R$ 0,00</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Não Acatadas</p>
                <p id="card-nao-acatadas" class="text-2xl font-bold text-red-600 mt-1">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Acatadas</p>
                <p id="card-acatadas" class="text-2xl font-bold text-green-600 mt-1">0</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mb-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <input type="text" id="filtro-fornecedor" oninput="renderizarTabela()" placeholder="Filtrar por Fornecedor..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#1e56a0]">
                <input type="text" id="filtro-nf" oninput="renderizarTabela()" placeholder="Filtrar por Nº NF..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#1e56a0]">
                <select id="filtro-status" onchange="renderizarTabela()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#1e56a0]">
                    <option value="">Todos os Status</option>
                    <option value="ACATADA">ACATADA</option>
                    <option value="NÃO ACATADA">NÃO ACATADA</option>
                </select>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-400 uppercase text-[11px] tracking-wider border-b border-gray-200">
                            <th class="p-4 font-semibold">Data</th>
                            <th class="p-4 font-semibold">Fornecedor</th>
                            <th class="p-4 font-semibold">NF</th>
                            <th class="p-4 font-semibold">Valor</th>
                            <th class="p-4 font-semibold">Chegada</th>
                            <th class="p-4 font-semibold">Saída</th>
                            <th class="p-4 font-semibold">Temp.</th>
                            <th class="p-4 font-semibold">Conferente</th>
                            <th class="p-4 font-semibold">Prevenção</th>
                            <th class="p-4 font-semibold">Status</th>
                            <th class="p-4 font-semibold">Observação</th>
                            <th class="p-4 font-semibold text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="divide-y divide-gray-100 text-gray-700 font-medium"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-nota" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full p-6">
            <h3 id="modal-titulo" class="text-lg font-bold text-gray-800 mb-4">Nova Nota Fiscal</h3>
            <form id="form-nota" onsubmit="salvarNota(event)" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <input type="hidden" id="nota-id">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Data</label>
                    <input type="date" id="input-data" required class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Fornecedor</label>
                    <input type="text" id="input-fornecedor" required class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Número da NF</label>
                    <input type="text" id="input-nf" required class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Valor (R$)</label>
                    <input type="number" step="0.01" id="input-valor" required class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Hora Chegada</label>
                    <input type="time" id="input-chegada" class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Hora Saída</label>
                    <input type="time" id="input-saida" class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Temperatura</label>
                    <input type="text" id="input-temp" class="w-full p-2 border border-gray-300 rounded-lg text-sm" placeholder="-">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Conferente</label>
                    <input type="text" id="input-conferente" class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Prevenção</label>
                    <input type="text" id="input-prevencao" class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Status</label>
                    <select id="input-status" class="w-full p-2 border border-gray-300 rounded-lg text-sm">
                        <option value="ACATADA">ACATADA</option>
                        <option value="NÃO ACATADA">NÃO ACATADA</option>
                    </select>
                </div>
                <div class="sm:col-span-2">
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Observação</label>
                    <input type="text" id="input-observacao" class="w-full p-2 border border-gray-300 rounded-lg text-sm" placeholder="-">
                </div>
                <div class="sm:col-span-2 flex justify-end gap-2 mt-4">
                    <button type="button" onclick="fecharModal()" class="px-4 py-2 border border-gray-300 text-sm rounded-lg hover:bg-gray-50">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-[#1e56a0] hover:bg-[#163f75] text-white text-sm rounded-lg font-medium">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let notas = JSON.parse(localStorage.getItem('notas_fiscais')) || [
            { id: "1", data: "2026-06-29", fornecedor: "Apol", nf: "61.975", valor: 1119.13, chegada: "07:06", saida: "07:10", temp: "-", conferente: "Amanda", prevencao: "Lucas", status: "ACATADA", observacao: "-" }
        ];

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor);
        }

        function formatarDataBR(dataIso) {
            if(!dataIso) return '-';
            const partes = dataIso.split('-');
            return partes.length === 3 ? `${partes[2]}/${partes[1]}/${partes[0]}` : dataIso;
        }

        function renderizarTabela() {
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';

            const fFornecedor = document.getElementById('filtro-fornecedor').value.toLowerCase();
            const fNf = document.getElementById('filtro-nf').value.toLowerCase();
            const fStatus = document.getElementById('filtro-status').value;

            let filtradas = notas.filter(n => 
                (n.fornecedor || '').toLowerCase().includes(fFornecedor) &&
                (n.nf || '').toLowerCase().includes(fNf) &&
                (fStatus === "" || n.status === fStatus)
            );

            document.getElementById('card-total-notas').innerText = filtradas.length;
            document.getElementById('card-valor-total').innerText = formatarMoeda(filtradas.reduce((acc, n) => acc + parseFloat(n.valor || 0), 0));
            document.getElementById('card-acatadas').innerText = filtradas.filter(n => n.status === 'ACATADA').length;
            document.getElementById('card-nao-acatadas').innerText = filtradas.filter(n => n.status === 'NÃO ACATADA').length;

            filtradas.forEach(nota => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50/80 transition text-gray-600 border-b border-gray-100";
                const badge = nota.status === 'ACATADA' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200';
                
                tr.innerHTML = `
                    <td class="p-4">${formatarDataBR(nota.data)}</td>
                    <td class="p-4 font-semibold text-gray-800">${nota.fornecedor}</td>
                    <td class="p-4">${nota.nf}</td>
                    <td class="p-4 font-bold text-gray-800">${formatarMoeda(nota.valor)}</td>
                    <td class="p-4">${nota.chegada}</td>
                    <td class="p-4">${nota.saida}</td>
                    <td class="p-4">${nota.temp}</td>
                    <td class="p-4">${nota.conferente}</td>
                    <td class="p-4">${nota.prevencao}</td>
                    <td class="p-4"><span class="px-2 py-0.5 text-xs font-bold rounded ${badge}">${nota.status}</span></td>
                    <td class="p-4 text-xs text-gray-400">${nota.observacao}</td>
                    <td class="p-4 text-center">
                        <button onclick="editarNota('${nota.id}')" class="text-amber-500 mr-2"><i class="fa-solid fa-pencil"></i></button>
                        <button onclick="excluirNota('${nota.id}')" class="text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
            localStorage.setItem('notas_fiscais', JSON.stringify(notas));
        }

        function abrirModal() { document.getElementById('form-nota').reset(); document.getElementById('nota-id').value = ""; document.getElementById('modal-nota').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modal-nota').classList.add('hidden'); }

        function salvarNota(event) {
            event.preventDefault();
            const id = document.getElementById('nota-id').value;
            const dados = {
                id: id || Date.now().toString(),
                data: document.getElementById('input-data').value,
                fornecedor: document.getElementById('input-fornecedor').value,
                nf: document.getElementById('input-nf').value,
                valor: parseFloat(document.getElementById('input-valor').value),
                chegada: document.getElementById('input-chegada').value || "-",
                saida: document.getElementById('input-saida').value || "-",
                temp: document.getElementById('input-temp').value || "-",
                conferente: document.getElementById('input-conferente').value || "-",
                prevencao: document.getElementById('input-prevencao').value || "-",
                status: document.getElementById('input-status').value,
                observacao: document.getElementById('input-observacao').value || "-"
            };

            if(id) { const idx = notas.findIndex(n => n.id === id); if(idx!==-1) notas[idx] = dados; }
            else { notas.push(dados); }
            fecharModal(); renderizarTabela();
        }

        function editarNota(id) {
            const n = notas.find(n => n.id === id); if(!n) return;
            document.getElementById('nota-id').value = n.id;
            document.getElementById('input-data').value = n.data;
            document.getElementById('input-fornecedor').value = n.fornecedor;
            document.getElementById('input-nf').value = n.nf;
            document.getElementById('input-valor').value = n.valor;
            document.getElementById('input-chegada').value = n.chegada==='-'?'':n.chegada;
            document.getElementById('input-saida').value = n.saida==='-'?'':n.saida;
            document.getElementById('input-temp').value = n.temp==='-'?'':n.temp;
            document.getElementById('input-conferente').value = n.conferente==='-'?'':n.conferente;
            document.getElementById('input-prevencao').value = n.prevencao==='-'?'':n.prevencao;
            document.getElementById('input-status').value = n.status;
            document.getElementById('input-observacao').value = n.observacao==='-'?'':n.observacao;
            document.getElementById('modal-nota').classList.remove('hidden');
        }

        function excluirNota(id) { if(confirm("Excluir nota?")) { notas = notas.filter(n => n.id !== id); renderizarTabela(); } }

        function exportarCSV() {
            let csv = "data:text/csv;charset=utf-8,\uFEFFData,Fornecedor,NF,Valor,Status\n";
            notas.forEach(n => { csv += `"${formatarDataBR(n.data)}","${n.fornecedor}","${n.nf}","${n.valor}","${n.status}"\n`; });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csv)); link.setAttribute("download", "notas.csv"); document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        renderizarTabela();
    </script>
</body>
</html>
